<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMMANDI — Accueil</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #e8e8e8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .phone {
      width: 340px;
      min-height: 660px;
      background: #fff;
      border-radius: 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,.22), 0 4px 12px rgba(0,0,0,.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      background: #f97316;
      height: 6px;
      width: 100%;
    }

    .inner {
      padding: 20px 24px 28px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #374151;
      font-size: 20px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      transition: background .15s;
    }
    .back-btn:hover { background: #f3f4f6; }
    .back-btn svg { width: 20px; height: 20px; }

    .title {
      font-size: 21px;
      font-weight: 800;
      color: #111827;
      margin-top: 14px;
      white-space: nowrap;
      letter-spacing: -0.3px;
    }
    .title span { color: #f97316; }

    .subtitle {
      font-size: 13.5px;
      color: #6b7280;
      margin-top: 5px;
      line-height: 1.4;
    }

    /* --- Image héro (remplace l'emoji) --- */
    .hero-img {
      width: 100%;
      height: 158px;
      border-radius: 16px;
      margin: 20px 0;
      position: relative;
      overflow: hidden;
      background: #fde68a; /* couleur de secours pendant le chargement */
    }
    .hero-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(249,115,22,.25) 0%, transparent 60%);
      pointer-events: none;
    }

    .roles { display: flex; flex-direction: column; gap: 11px; }

    .role-card {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 14px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 13px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .1s;
      background: #fff;
      text-decoration: none;
    }
    .role-card:hover {
      border-color: #f97316;
      box-shadow: 0 2px 14px rgba(249,115,22,.15);
      transform: translateY(-1px);
    }
    .role-card:active { transform: translateY(0); }

    /* --- Icônes SVG (remplacent les emojis) --- */
    .role-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #fff7ed;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .role-icon svg {
      width: 21px;
      height: 21px;
      stroke: #f97316;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .role-text { flex: 1; }
    .role-name {
      font-size: 13.5px;
      font-weight: 700;
      color: #f97316;
    }
    .role-desc {
      font-size: 11.5px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .role-arrow { color: #d1d5db; font-size: 18px; }

    .footer {
      margin-top: 22px;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
      line-height: 1.6;
    }
    .footer a { color: #f97316; text-decoration: none; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="top-bar"></div>
    <div class="inner">

      <button class="back-btn" onclick="history.back()" aria-label="Retour">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </svg>
      </button>

      <h1 class="title">Bienvenue sur <span>COMMANDI</span></h1>
      <p class="subtitle">Comment souhaitez-vous utiliser l'application&nbsp;?</p>

      <div class="hero-img">
        <img src="images/Livraison-first.png" alt="Livraison COMMANDI" onerror="this.style.display='none'">
      </div>

      <div class="roles">
        <a class="role-card" href="login.html?role=client">
          <div class="role-icon">
            <!-- Panier -->
            <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          </div>
          <div class="role-text">
            <div class="role-name">Je suis Client</div>
            <div class="role-desc">Commander et me faire livrer</div>
          </div>
          <span class="role-arrow">›</span>
        </a>

        <a class="role-card" href="login.html?role=commercant">
          <div class="role-icon">
            <!-- Boutique -->
            <svg viewBox="0 0 24 24"><path d="M3 9l1.5-5h15L21 9"/><path d="M3 9a2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0"/><path d="M4 9v9a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9"/><path d="M9 21v-6a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v6"/></svg>
          </div>
          <div class="role-text">
            <div class="role-name">Je suis Commerçant</div>
            <div class="role-desc">Référencer mon commerce</div>
          </div>
          <span class="role-arrow">›</span>
        </a>

        <a class="role-card" href="login.html?role=livreur">
          <div class="role-icon">
            <!-- Scooter -->
            <svg viewBox="0 0 24 24"><circle cx="5" cy="18" r="3"/><circle cx="19" cy="18" r="3"/><path d="M5 18V9h4l3 4h5"/><path d="M9 9V6h2"/><path d="M15 13h3l2 2"/></svg>
          </div>
          <div class="role-text">
            <div class="role-name">Je suis Livreur</div>
            <div class="role-desc">Rejoindre la flotte COMMANDI</div>
          </div>
          <span class="role-arrow">›</span>
        </a>
      </div>

      <p class="footer">
        En continuant, vous acceptez nos<br>
        <a href="#">Conditions Générales d'Utilisation</a>.
      </p>

    </div>
  </div>
</body>
</html>
